name: Menu Update Alert

on:
  schedule:
    # 식단표 특성에 맞게 평일(월~금) 출근길인 아침 8시에 한 번, 점심 전 11시에 한 번 체크하도록 설정했습니다.
    # 0 23 * * 0-4 -> 한국 시간: 월~금 아침 8시
    - cron: '0 23 * * 0-4'
    # 0 2 * * 1-5 -> 한국 시간: 월~금 오전 11시
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  run-menu-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-telegram-bot
          
      - name: Run Menu Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python menu_checker.py
          
      - name: Commit and Push History
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_menu_hash.txt || true
          git commit -m "Update menu history" || exit 0
          git push
