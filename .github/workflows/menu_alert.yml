name: Menu Update Alert

on:
  schedule:
    - cron: '0 23 * * 0-4'
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  run-menu-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager python-telegram-bot
          
      - name: Run Menu Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python menu_checker.py
          
      - name: Commit and Push History
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_menu_hash.txt || true
          git commit -m "Update menu history" || exit 0
          git push
